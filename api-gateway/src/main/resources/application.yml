server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        # ========================
        # NORMAL ROUTES
        # ========================

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**

        - id: customer-service
          uri: http://localhost:8083
          predicates:
            - Path=/customers/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/orders/**

        - id: salon-service
          uri: http://localhost:8085
          predicates:
            - Path=/services/**

        - id: appointment-service
          uri: http://localhost:8086
          predicates:
            - Path=/appointments/**

        - id: payment-service
          uri: http://localhost:8087
          predicates:
            - Path=/payments/**

        # ========================
        # SWAGGER ROUTES
        # ========================

        - id: product-docs
          uri: http://localhost:8082
          predicates:
            - Path=/products/v3/api-docs
          filters:
            - RewritePath=/products/(?<segment>.*), /${segment}

        - id: customer-docs
          uri: http://localhost:8083
          predicates:
            - Path=/customers/v3/api-docs
          filters:
            - RewritePath=/customers/(?<segment>.*), /${segment}

        - id: order-docs
          uri: http://localhost:8084
          predicates:
            - Path=/orders/v3/api-docs
          filters:
            - RewritePath=/orders/(?<segment>.*), /${segment}

        - id: salon-docs
          uri: http://localhost:8085
          predicates:
            - Path=/services/v3/api-docs
          filters:
            - RewritePath=/services/(?<segment>.*), /${segment}

        - id: appointment-docs
          uri: http://localhost:8086
          predicates:
            - Path=/appointments/v3/api-docs
          filters:
            - RewritePath=/appointments/(?<segment>.*), /${segment}

        - id: payment-docs
          uri: http://localhost:8087
          predicates:
            - Path=/payments/v3/api-docs
          filters:
            - RewritePath=/payments/(?<segment>.*), /${segment}

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    path: /swagger-ui/webjars/swagger-ui/index.html
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true
    urls:
      - name: Product Service
        url: /products/v3/api-docs
      - name: Customer Service
        url: /customers/v3/api-docs
      - name: Order Service
        url: /orders/v3/api-docs
      - name: Salon Service
        url: /services/v3/api-docs
      - name: Appointment Service
        url: /appointments/v3/api-docs
      - name: Payment Service
        url: /payments/v3/api-docs

    urls-primary-name: Product Service
    display-request-duration: true
    doc-expansion: none
    filter: true
    tags-sorter: alpha
    operations-sorter: method
    deep-linking: true
    display-operation-id: false
    default-models-expand-depth: -1
    default-model-expand-depth: 2
    show-extensions: true
    show-common-extensions: true
    try-it-out-enabled: true

